<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Shop | Placeholder Store</title>
	<style>
		:root {
			--bg-1: #0f172a;
			--bg-2: #1d4ed8;
			--panel: rgba(255, 255, 255, 0.9);
			--text: #0f172a;
			--muted: #334155;
			--accent: #0ea5e9;
			--accent-dark: #0369a1;
			--line: rgba(15, 23, 42, 0.12);
			--radius: 16px;
			--shadow: 0 12px 30px rgba(15, 23, 42, 0.2);
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			color: var(--text);
			min-height: 100vh;
			background: radial-gradient(circle at 10% 10%, rgba(14, 165, 233, 0.35), transparent 36%),
									radial-gradient(circle at 90% 20%, rgba(59, 130, 246, 0.35), transparent 32%),
									linear-gradient(135deg, var(--bg-1), var(--bg-2));
			padding: 28px;
		}

		.shop-shell {
			max-width: 1120px;
			margin: 0 auto;
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: 22px;
			box-shadow: var(--shadow);
			overflow: hidden;
			backdrop-filter: blur(6px);
		}

		.shop-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 16px;
			padding: 22px 24px;
			border-bottom: 1px solid var(--line);
			background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.96));
		}

		.shop-title h1 {
			font-size: 1.8rem;
			line-height: 1.2;
			margin-bottom: 4px;
			letter-spacing: 0.2px;
		}

		.shop-title p {
			color: var(--muted);
			font-size: 0.98rem;
		}

		.header-actions {
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.pill {
			border: 0;
			border: 1px solid var(--line);
			border-radius: 999px;
			padding: 8px 14px;
			font-size: 0.95rem;
			background: #fff;
			color: #0f172a;
			font-weight: 600;
			cursor: pointer;
		}

		.pill:hover {
			background: #f8fafc;
		}

		.back-link {
			text-decoration: none;
			background: var(--accent);
			color: #fff;
			border-radius: 10px;
			padding: 8px 14px;
			font-weight: 600;
			transition: background 0.2s ease;
		}

		.back-link:hover {
			background: var(--accent-dark);
		}

		.product-grid {
			display: grid;
			grid-template-columns: repeat(4, minmax(0, 1fr));
			gap: 16px;
			padding: 20px;
		}

		.product-card {
			border: 1px solid var(--line);
			border-radius: var(--radius);
			overflow: hidden;
			background: #ffffff;
			display: flex;
			flex-direction: column;
			min-height: 330px;
		}

		.product-art {
			height: 140px;
			display: grid;
			place-items: center;
			color: #0b4a6e;
			font-weight: 700;
			letter-spacing: 0.4px;
			font-size: 0.95rem;
			border-bottom: 1px solid var(--line);
			background-size: 180% 180%;
			animation: hueDrift 8s ease infinite;
		}

		.art-1 { background-image: linear-gradient(130deg, #bfdbfe, #e0f2fe); }
		.art-2 { background-image: linear-gradient(130deg, #c7d2fe, #ddd6fe); }
		.art-3 { background-image: linear-gradient(130deg, #fde68a, #fbcfe8); }
		.art-4 { background-image: linear-gradient(130deg, #bbf7d0, #bae6fd); }

		.product-body {
			padding: 14px;
			display: flex;
			flex-direction: column;
			gap: 10px;
			height: 100%;
		}

		.product-name {
			font-size: 1.05rem;
			font-weight: 700;
		}

		.product-description {
			color: var(--muted);
			font-size: 0.92rem;
			line-height: 1.4;
			min-height: 58px;
		}

		.product-footer {
			margin-top: auto;
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 10px;
		}

		.price {
			font-weight: 700;
			font-size: 1.05rem;
			color: #0b4a6e;
		}

		.add-btn {
			border: 0;
			border-radius: 10px;
			background: #0f172a;
			color: #fff;
			font-weight: 600;
			padding: 9px 12px;
			cursor: pointer;
			transition: transform 0.15s ease, background 0.2s ease;
		}

		.add-btn:hover {
			background: #111827;
			transform: translateY(-1px);
		}

		.add-btn:active {
			transform: translateY(0);
		}

		.cart-overlay {
			position: fixed;
			inset: 0;
			background: rgba(2, 6, 23, 0.55);
			display: none;
			align-items: center;
			justify-content: center;
			padding: 16px;
			z-index: 1000;
		}

		.cart-overlay.open {
			display: flex;
		}

		.cart-modal {
			width: min(620px, 100%);
			max-height: 88vh;
			background: #ffffff;
			border-radius: 16px;
			box-shadow: 0 16px 40px rgba(2, 6, 23, 0.3);
			border: 1px solid var(--line);
			overflow: hidden;
			display: flex;
			flex-direction: column;
		}

		.cart-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 14px 16px;
			border-bottom: 1px solid var(--line);
		}

		.cart-header h2 {
			font-size: 1.1rem;
		}

		.close-cart-btn {
			border: 0;
			background: #e2e8f0;
			color: #0f172a;
			font-weight: 700;
			border-radius: 8px;
			padding: 7px 10px;
			cursor: pointer;
		}

		.cart-items {
			padding: 12px 16px;
			overflow: auto;
			display: flex;
			flex-direction: column;
			gap: 10px;
			min-height: 140px;
		}

		.cart-empty {
			text-align: center;
			color: var(--muted);
			padding: 24px 0;
		}

		.cart-item {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 10px;
			align-items: center;
			border: 1px solid var(--line);
			border-radius: 12px;
			padding: 10px;
		}

		.cart-item-name {
			font-weight: 700;
			margin-bottom: 4px;
		}

		.cart-item-price {
			font-size: 0.92rem;
			color: var(--muted);
		}

		.cart-item-actions {
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.qty-btn,
		.remove-btn {
			border: 0;
			border-radius: 8px;
			padding: 7px 9px;
			font-weight: 700;
			cursor: pointer;
		}

		.qty-btn {
			background: #e2e8f0;
			color: #0f172a;
		}

		.remove-btn {
			background: #fee2e2;
			color: #991b1b;
		}

		.qty-value {
			min-width: 22px;
			text-align: center;
			font-weight: 700;
		}

		.cart-footer {
			border-top: 1px solid var(--line);
			padding: 12px 16px 16px;
			display: flex;
			flex-direction: column;
			gap: 10px;
		}

		.cart-summary {
			display: flex;
			justify-content: space-between;
			font-weight: 700;
		}

		.checkout-btn {
			border: 0;
			border-radius: 10px;
			padding: 11px 12px;
			font-weight: 700;
			background: var(--accent);
			color: #fff;
			cursor: pointer;
		}

		.checkout-btn:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}

		@keyframes hueDrift {
			0% { background-position: 0% 50%; }
			50% { background-position: 100% 50%; }
			100% { background-position: 0% 50%; }
		}

		@media (max-width: 1000px) {
			.product-grid {
				grid-template-columns: repeat(2, minmax(0, 1fr));
			}
		}

		@media (max-width: 640px) {
			body {
				padding: 14px;
			}

			.shop-header {
				flex-direction: column;
				align-items: stretch;
			}

			.header-actions {
				justify-content: space-between;
			}

			.product-grid {
				grid-template-columns: 1fr;
				padding: 14px;
			}

			.product-card {
				min-height: 300px;
			}

			.cart-modal {
				width: 100%;
				max-height: 92vh;
			}

			.cart-item {
				grid-template-columns: 1fr;
			}

			.cart-item-actions {
				justify-content: flex-start;
			}
		}
	</style>
</head>
<body>
	<main class="shop-shell">
		<header class="shop-header">
			<div class="shop-title">
				<h1>Shop</h1>
				<p>View my items below.</p>
			</div>
			<div class="header-actions">
				<button class="pill" id="openCartBtn" type="button">Cart: <span id="cartCount">0</span></button>
				<a class="back-link" href="index.html">Back</a>
			</div>
		</header>

		<section class="product-grid">
			<article class="product-card">
				<div class="product-art art-1">Placeholder Image</div>
				<div class="product-body">
					<h2 class="product-name">Placeholder Item 01</h2>
					<p class="product-description">TBD</p>
					<div class="product-footer">
						<span class="price">$19.99</span>
						<button class="add-btn" type="button" data-item="Placeholder Item 01" data-price="19.99">Add to Cart</button>
					</div>
				</div>
			</article>

			<article class="product-card">
				<div class="product-art art-2">Placeholder Image</div>
				<div class="product-body">
					<h2 class="product-name">Placeholder Item 02</h2>
					<p class="product-description">TBD</p>
					<div class="product-footer">
						<span class="price">$24.99</span>
						<button class="add-btn" type="button" data-item="Placeholder Item 02" data-price="24.99">Add to Cart</button>
					</div>
				</div>
			</article>

			<article class="product-card">
				<div class="product-art art-3">Placeholder Image</div>
				<div class="product-body">
					<h2 class="product-name">Placeholder Item 03</h2>
					<p class="product-description">TBD</p>
					<div class="product-footer">
						<span class="price">$29.99</span>
						<button class="add-btn" type="button" data-item="Placeholder Item 03" data-price="29.99">Add to Cart</button>
					</div>
				</div>
			</article>

			<article class="product-card">
				<div class="product-art art-4">Placeholder Image</div>
				<div class="product-body">
					<h2 class="product-name">Placeholder Item 04</h2>
					<p class="product-description">TBD</p>
					<div class="product-footer">
						<span class="price">$34.99</span>
						<button class="add-btn" type="button" data-item="Placeholder Item 04" data-price="34.99">Add to Cart</button>
					</div>
				</div>
			</article>
		</section>
	</main>

	<div class="cart-overlay" id="cartOverlay" aria-hidden="true">
		<div class="cart-modal" role="dialog" aria-modal="true" aria-labelledby="cartTitle">
			<div class="cart-header">
				<h2 id="cartTitle">Your Cart</h2>
				<button class="close-cart-btn" id="closeCartBtn" type="button">Close</button>
			</div>
			<div class="cart-items" id="cartItems"></div>
			<div class="cart-footer">
				<div class="cart-summary">
					<span>Subtotal</span>
					<span id="cartSubtotal">$0.00</span>
				</div>
				<button class="checkout-btn" id="checkoutBtn" type="button" disabled>Checkout</button>
			</div>
		</div>
	</div>

	<script>
		(function () {
			var cart = {};
			var cartCountEl = document.getElementById('cartCount');
			var cartItemsEl = document.getElementById('cartItems');
			var cartSubtotalEl = document.getElementById('cartSubtotal');
			var checkoutBtn = document.getElementById('checkoutBtn');
			var openCartBtn = document.getElementById('openCartBtn');
			var closeCartBtn = document.getElementById('closeCartBtn');
			var cartOverlay = document.getElementById('cartOverlay');
			var buttons = document.querySelectorAll('.add-btn');

			function formatMoney(value) {
				return '$' + value.toFixed(2);
			}

			function getCartStats() {
				var names = Object.keys(cart);
				var count = 0;
				var subtotal = 0;

				names.forEach(function (name) {
					count += cart[name].qty;
					subtotal += cart[name].qty * cart[name].price;
				});

				return { count: count, subtotal: subtotal, isEmpty: names.length === 0 };
			}

			function renderCart() {
				var names = Object.keys(cart);
				var stats = getCartStats();

				cartCountEl.textContent = String(stats.count);
				cartSubtotalEl.textContent = formatMoney(stats.subtotal);
				checkoutBtn.disabled = stats.isEmpty;

				if (stats.isEmpty) {
					cartItemsEl.innerHTML = '<p class="cart-empty">Your cart is empty.</p>';
					return;
				}

				cartItemsEl.innerHTML = names.map(function (name) {
					var item = cart[name];
					return (
						'<div class="cart-item">' +
							'<div>' +
								'<p class="cart-item-name">' + name + '</p>' +
								'<p class="cart-item-price">' + formatMoney(item.price) + ' each</p>' +
							'</div>' +
							'<div class="cart-item-actions">' +
								'<button class="qty-btn" type="button" data-action="decrease" data-item="' + name + '">-</button>' +
								'<span class="qty-value">' + item.qty + '</span>' +
								'<button class="qty-btn" type="button" data-action="increase" data-item="' + name + '">+</button>' +
								'<button class="remove-btn" type="button" data-action="remove" data-item="' + name + '">Remove</button>' +
							'</div>' +
						'</div>'
					);
				}).join('');
			}

			function openCart() {
				cartOverlay.classList.add('open');
				cartOverlay.setAttribute('aria-hidden', 'false');
			}

			function closeCart() {
				cartOverlay.classList.remove('open');
				cartOverlay.setAttribute('aria-hidden', 'true');
			}

			buttons.forEach(function (btn) {
				btn.addEventListener('click', function () {
					var name = btn.getAttribute('data-item');
					var price = Number(btn.getAttribute('data-price'));

					if (!cart[name]) {
						cart[name] = { qty: 0, price: price };
					}

					cart[name].qty += 1;
					renderCart();
				});
			});

			openCartBtn.addEventListener('click', openCart);
			closeCartBtn.addEventListener('click', closeCart);

			cartOverlay.addEventListener('click', function (event) {
				if (event.target === cartOverlay) {
					closeCart();
				}
			});

			document.addEventListener('keydown', function (event) {
				if (event.key === 'Escape' && cartOverlay.classList.contains('open')) {
					closeCart();
				}
			});

			cartItemsEl.addEventListener('click', function (event) {
				var target = event.target;
				if (!(target instanceof HTMLElement)) return;

				var action = target.getAttribute('data-action');
				var name = target.getAttribute('data-item');
				if (!action || !name || !cart[name]) return;

				if (action === 'increase') {
					cart[name].qty += 1;
				} else if (action === 'decrease') {
					cart[name].qty -= 1;
					if (cart[name].qty <= 0) {
						delete cart[name];
					}
				} else if (action === 'remove') {
					delete cart[name];
				}

				renderCart();
			});

			checkoutBtn.addEventListener('click', function () {
				var stats = getCartStats();
				if (stats.isEmpty) return;

				alert('Checkout complete. Total: ' + formatMoney(stats.subtotal));
				cart = {};
				renderCart();
				closeCart();
			});

			renderCart();
		})();
	</script>
</body>
</html>
